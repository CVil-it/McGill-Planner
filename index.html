<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McGill Degree Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #ED1B2F; }
        select {
            font-size: 1em;
            padding: 8px 12px;
            margin-bottom: 24px;
            width: 100%;
        }
        .course {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .credits {
            margin-left: auto;
            color: #888;
            font-size: 0.9em;
        }
        #summary {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>McGill Degree Planner</h1>

    <select id="major-select" onchange="changeMajor()">
        <option value="">-- Select your major --</option>
        <option value="cs">Computer Science (BSc)</option>
        <option value="math">Mathematics (BSc)</option>
        <option value="biology">Biology (BSc)</option>
    </select>

    <h2 id="major-title"></h2>
    <div id="course-list"></div>
    <div id="summary"></div>

    <script>
        const majors = {
            cs: {
                name: "Computer Science — Required Courses",
                totalRequired: 63,
                courses: [
                    { code: "COMP 202", name: "Foundations of Programming", credits: 3 },
                    { code: "COMP 250", name: "Introduction to Computer Science", credits: 3 },
                    { code: "COMP 251", name: "Algorithms and Data Structures", credits: 3 },
                    { code: "COMP 273", name: "Introduction to Computer Systems", credits: 3 },
                    { code: "COMP 302", name: "Programming Languages and Paradigms", credits: 3 },
                    { code: "COMP 310", name: "Operating Systems", credits: 3 },
                    { code: "COMP 330", name: "Theory of Computation", credits: 3 },
                    { code: "COMP 360", name: "Algorithm Design", credits: 3 },
                ]
            },
            math: {
                name: "Mathematics — Required Courses",
                totalRequired: 60,
                courses: [
                    { code: "MATH 133", name: "Linear Algebra and Geometry", credits: 3 },
                    { code: "MATH 141", name: "Calculus 2", credits: 4 },
                    { code: "MATH 222", name: "Calculus 3", credits: 3 },
                    { code: "MATH 235", name: "Algebra 1", credits: 3 },
                    { code: "MATH 251", name: "Honours Algebra 2", credits: 3 },
                    { code: "MATH 255", name: "Honours Analysis 1", credits: 3 },
                    { code: "MATH 325", name: "Ordinary Differential Equations", credits: 3 },
                    { code: "MATH 356", name: "Honours Probability", credits: 3 },
                ]
            },
            biology: {
                name: "Biology — Required Courses",
                totalRequired: 60,
                courses: [
                    { code: "BIOL 112", name: "Cell and Molecular Biology", credits: 3 },
                    { code: "BIOL 200", name: "Molecular Biology", credits: 3 },
                    { code: "BIOL 201", name: "Cell Biology and Metabolism", credits: 3 },
                    { code: "BIOL 202", name: "Basic Genetics", credits: 3 },
                    { code: "CHEM 110", name: "General Chemistry 1", credits: 3 },
                    { code: "CHEM 120", name: "General Chemistry 2", credits: 3 },
                    { code: "PHYS 101", name: "Introductory Physics", credits: 3 },
                    { code: "BIOL 300", name: "Biostatistics", credits: 3 },
                ]
            }
        };

        function changeMajor() {
            const key = document.getElementById('major-select').value;
            const courseList = document.getElementById('course-list');
            const title = document.getElementById('major-title');
            const summary = document.getElementById('summary');

            if (!key) {
                title.textContent = '';
                courseList.innerHTML = '';
                summary.textContent = '';
                return;
            }

            const major = majors[key];
            title.textContent = major.name;
            courseList.innerHTML = '';

            major.courses.forEach(course => {
                const div = document.createElement('div');
                div.className = 'course';
                div.innerHTML = `
                    <input type="checkbox" data-credits="${course.credits}" onchange="updateCredits()">
                    <span>${course.code} — ${course.name}</span>
                    <span class="credits">${course.credits} credits</span>
                `;
                courseList.appendChild(div);
            });

            updateCredits();
        }

        function updateCredits() {
            const key = document.getElementById('major-select').value;
            if (!key) return;

            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            let completed = 0;
            let listed = 0;
            checkboxes.forEach(box => {
                const credits = parseInt(box.dataset.credits);
                listed += credits;
                if (box.checked) completed += credits;
            });

            const total = majors[key].totalRequired;
            const percent = Math.round((completed / total) * 100);
            document.getElementById('summary').textContent =
                `Credits completed: ${completed} / ${total} required (${percent}%) — showing ${listed} of ${total} credits`;
        }
    </script>
</body>
</html>
