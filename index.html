<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McGill Degree Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #ED1B2F; }
        select, input[type="text"] {
            font-size: 1em;
            padding: 8px 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            align-items: center;
        }
        .row select, .row input { flex: 1; }
        button {
            padding: 8px 16px;
            font-size: 0.95em;
            cursor: pointer;
            white-space: nowrap;
        }
        .btn-red {
            background: #ED1B2F;
            color: white;
            border: none;
            border-radius: 4px;
        }
        .btn-grey {
            background: #eee;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .section-label {
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 20px 0 6px;
        }
        .course {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .course-info { flex: 1; }
        .credits { color: #888; font-size: 0.9em; white-space: nowrap; }
        .grade-select {
            font-size: 0.85em;
            padding: 3px 6px;
            width: auto;
            display: none;
        }

        /* Progress bar */
        #progress-container {
            margin-top: 20px;
            display: none;
        }
        #progress-bar-track {
            background: #eee;
            border-radius: 999px;
            height: 16px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        #progress-bar-fill {
            background: #ED1B2F;
            height: 100%;
            width: 0%;
            border-radius: 999px;
            transition: width 0.3s ease;
        }
        #summary {
            font-size: 1em;
            color: #444;
        }

        /* GPA */
        #gpa-container {
            margin-top: 16px;
            padding: 12px 16px;
            background: #f9f9f9;
            border-radius: 8px;
            border: 1px solid #eee;
            display: none;
        }
        #gpa-display {
            font-size: 1.4em;
            font-weight: bold;
            color: #ED1B2F;
        }
        #gpa-label {
            font-size: 0.85em;
            color: #888;
            margin-top: 2px;
        }

        #save-status { font-size: 0.85em; color: #888; margin-top: 4px; min-height: 1.2em; }
        hr { border: none; border-top: 1px solid #ddd; margin: 24px 0; }
    </style>
</head>
<body>
    <h1>McGill Degree Planner</h1>

    <div class="section-label">Your Major</div>
    <div class="row">
        <select id="major-select" onchange="changeMajor()">
            <option value="">-- Select your major --</option>
        </select>
        <button class="btn-grey" onclick="clearCurrent()">Clear</button>
    </div>

    <hr>

    <div class="section-label">Profiles</div>
    <div class="row">
        <input type="text" id="profile-name-input" placeholder="Profile name (e.g. CS Major Plan)">
        <button class="btn-red" onclick="saveProfile()">Save</button>
    </div>
    <div class="row">
        <select id="profile-select">
            <option value="">-- Load a profile --</option>
        </select>
        <button class="btn-grey" onclick="loadProfile()">Load</button>
        <button class="btn-grey" onclick="deleteProfile()">Delete</button>
    </div>
    <div id="save-status"></div>

    <hr>

    <h2 id="major-title"></h2>
    <div id="course-list"></div>

    <!-- Progress bar -->
    <div id="progress-container">
        <div id="progress-bar-track">
            <div id="progress-bar-fill"></div>
        </div>
        <div id="summary"></div>
    </div>

    <!-- GPA -->
    <div id="gpa-container">
        <div id="gpa-display">—</div>
        <div id="gpa-label">Cumulative GPA (McGill scale) — enter grades on checked courses</div>
    </div>

    <script>
        let programs = {};

        const GRADES = {
            'A':  4.0, 'A-': 3.7,
            'B+': 3.3, 'B':  3.0, 'B-': 2.7,
            'C+': 2.3, 'C':  2.0,
            'D':  1.0, 'F':  0.0
        };

        // ── Init ──────────────────────────────────────────────
        async function init() {
            const response = await fetch('data/programs.json');
            programs = await response.json();

            const select = document.getElementById('major-select');
            for (const key in programs) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = programs[key].name;
                select.appendChild(option);
            }

            const savedMajor = localStorage.getItem('mcgill-major');
            if (savedMajor) {
                select.value = savedMajor;
                changeMajor(false);

                const savedChecked = JSON.parse(localStorage.getItem('mcgill-checked') || '[]');
                const savedGrades = JSON.parse(localStorage.getItem('mcgill-grades') || '{}');

                document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                    if (savedChecked.includes(box.dataset.code)) {
                        box.checked = true;
                        const gradeEl = box.closest('.course').querySelector('.grade-select');
                        gradeEl.style.display = 'inline-block';
                        if (savedGrades[box.dataset.code]) {
                            gradeEl.value = savedGrades[box.dataset.code];
                        }
                    }
                });
                updateAll();
            }

            refreshProfileDropdown();
        }

        // ── Render courses ────────────────────────────────────
        function changeMajor(clearChecks = true) {
            const key = document.getElementById('major-select').value;
            const courseList = document.getElementById('course-list');
            const title = document.getElementById('major-title');

            if (!key) {
                title.textContent = '';
                courseList.innerHTML = '';
                document.getElementById('progress-container').style.display = 'none';
                document.getElementById('gpa-container').style.display = 'none';
                localStorage.removeItem('mcgill-major');
                localStorage.removeItem('mcgill-checked');
                localStorage.removeItem('mcgill-grades');
                return;
            }

            const program = programs[key];
            title.textContent = program.name + ' — Required Courses';
            courseList.innerHTML = '';

            program.courses.forEach(course => {
                const div = document.createElement('div');
                div.className = 'course';

                // Build grade options
                const gradeOptions = Object.keys(GRADES)
                    .map(g => `<option value="${g}">${g}</option>`)
                    .join('');

                div.innerHTML = `
                    <input type="checkbox"
                        data-credits="${course.credits}"
                        data-code="${course.code}"
                        onchange="onCheck(this)">
                    <div class="course-info">
                        <span>${course.code} — ${course.name}</span>
                    </div>
                    <select class="grade-select" onchange="onGradeChange()">
                        <option value="">Grade</option>
                        ${gradeOptions}
                    </select>
                    <span class="credits">${course.credits} cr</span>
                `;
                courseList.appendChild(div);
            });

            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('gpa-container').style.display = 'block';

            if (clearChecks) {
                localStorage.setItem('mcgill-major', key);
                localStorage.setItem('mcgill-checked', JSON.stringify([]));
                localStorage.setItem('mcgill-grades', JSON.stringify({}));
            }

            updateAll();
        }

        // ── Checkbox + grade changes ──────────────────────────
        function onCheck(box) {
            const gradeEl = box.closest('.course').querySelector('.grade-select');
            gradeEl.style.display = box.checked ? 'inline-block' : 'none';
            if (!box.checked) gradeEl.value = '';
            autoSave();
            updateAll();
        }

        function onGradeChange() {
            autoSave();
            updateAll();
        }

        // ── Update progress + GPA ─────────────────────────────
        function updateAll() {
            updateProgress();
            updateGPA();
        }

        function updateProgress() {
            const key = document.getElementById('major-select').value;
            if (!key) return;

            let completed = 0;
            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                if (box.checked) completed += parseInt(box.dataset.credits);
            });

            const total = programs[key].totalRequired;
            const percent = Math.round((completed / total) * 100);

            document.getElementById('progress-bar-fill').style.width = percent + '%';
            document.getElementById('summary').textContent =
                `${completed} / ${total} required credits completed (${percent}%)`;
        }

        function updateGPA() {
            let totalPoints = 0;
            let totalCredits = 0;

            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                if (!box.checked) return;
                const gradeEl = box.closest('.course').querySelector('.grade-select');
                const grade = gradeEl.value;
                if (!grade) return;
                const credits = parseInt(box.dataset.credits);
                totalPoints += GRADES[grade] * credits;
                totalCredits += credits;
            });

            const gpaDisplay = document.getElementById('gpa-display');
            if (totalCredits === 0) {
                gpaDisplay.textContent = '—';
            } else {
                gpaDisplay.textContent = (totalPoints / totalCredits).toFixed(2) + ' / 4.00';
            }
        }

        // ── Auto-save ─────────────────────────────────────────
        function autoSave() {
            const key = document.getElementById('major-select').value;
            if (!key) return;

            const checked = [];
            const grades = {};

            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                if (box.checked) {
                    checked.push(box.dataset.code);
                    const grade = box.closest('.course').querySelector('.grade-select').value;
                    if (grade) grades[box.dataset.code] = grade;
                }
            });

            localStorage.setItem('mcgill-major', key);
            localStorage.setItem('mcgill-checked', JSON.stringify(checked));
            localStorage.setItem('mcgill-grades', JSON.stringify(grades));
        }

        // ── Clear ─────────────────────────────────────────────
        function clearCurrent() {
            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                box.checked = false;
                const gradeEl = box.closest('.course').querySelector('.grade-select');
                gradeEl.style.display = 'none';
                gradeEl.value = '';
            });
            localStorage.setItem('mcgill-checked', JSON.stringify([]));
            localStorage.setItem('mcgill-grades', JSON.stringify({}));
            updateAll();
        }

        // ── Profiles ──────────────────────────────────────────
        function getProfiles() {
            return JSON.parse(localStorage.getItem('mcgill-profiles') || '{}');
        }

        function saveProfile() {
            const name = document.getElementById('profile-name-input').value.trim();
            const key = document.getElementById('major-select').value;
            if (!name) { setStatus('Enter a profile name first.'); return; }
            if (!key) { setStatus('Select a major before saving.'); return; }

            const checked = [];
            const grades = {};
            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                if (box.checked) {
                    checked.push(box.dataset.code);
                    const grade = box.closest('.course').querySelector('.grade-select').value;
                    if (grade) grades[box.dataset.code] = grade;
                }
            });

            const profiles = getProfiles();
            profiles[name] = { major: key, checked, grades };
            localStorage.setItem('mcgill-profiles', JSON.stringify(profiles));
            document.getElementById('profile-name-input').value = '';
            refreshProfileDropdown();
            setStatus(`Profile "${name}" saved.`);
        }

        function loadProfile() {
            const name = document.getElementById('profile-select').value;
            if (!name) return;
            const profiles = getProfiles();
            const profile = profiles[name];
            if (!profile) return;

            document.getElementById('major-select').value = profile.major;
            changeMajor(false);

            document.querySelectorAll('input[type="checkbox"]').forEach(box => {
                box.checked = profile.checked.includes(box.dataset.code);
                const gradeEl = box.closest('.course').querySelector('.grade-select');
                gradeEl.style.display = box.checked ? 'inline-block' : 'none';
                gradeEl.value = box.checked && profile.grades[box.dataset.code]
                    ? profile.grades[box.dataset.code] : '';
            });

            updateAll();
            autoSave();
            setStatus(`Loaded profile "${name}".`);
        }

        function deleteProfile() {
            const name = document.getElementById('profile-select').value;
            if (!name) { setStatus('Select a profile to delete.'); return; }
            const profiles = getProfiles();
            delete profiles[name];
            localStorage.setItem('mcgill-profiles', JSON.stringify(profiles));
            refreshProfileDropdown();
            setStatus(`Profile "${name}" deleted.`);
        }

        function refreshProfileDropdown() {
            const select = document.getElementById('profile-select');
            const profiles = getProfiles();
            select.innerHTML = '<option value="">-- Load a saved profile --</option>';
            for (const name in profiles) {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = `${name} (${programs[profiles[name].major]?.name || profiles[name].major})`;
                select.appendChild(option);
            }
        }

        function setStatus(msg) {
            const el = document.getElementById('save-status');
            el.textContent = msg;
            setTimeout(() => el.textContent = '', 3000);
        }

        init();
    </script>
</body>
</html>
