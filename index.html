<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>McGill Degree Planner</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 { color: #ED1B2F; }
        select {
            font-size: 1em;
            padding: 8px 12px;
            margin-bottom: 24px;
            width: 100%;
        }
        .course {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .credits {
            margin-left: auto;
            color: #888;
            font-size: 0.9em;
        }
        #summary {
            margin-top: 20px;
            font-size: 1.1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>McGill Degree Planner</h1>

    <select id="major-select" onchange="changeMajor()">
        <option value="">-- Select your major --</option>
    </select>

    <h2 id="major-title"></h2>
    <div id="course-list"></div>
    <div id="summary"></div>

    <script>
        let programs = {};

        // When the page loads, fetch the JSON file and populate the dropdown
        async function init() {
            const response = await fetch('data/programs.json');
            programs = await response.json();

            const select = document.getElementById('major-select');
            for (const key in programs) {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = programs[key].name;
                select.appendChild(option);
            }
        }

        function changeMajor() {
            const key = document.getElementById('major-select').value;
            const courseList = document.getElementById('course-list');
            const title = document.getElementById('major-title');
            const summary = document.getElementById('summary');

            if (!key) {
                title.textContent = '';
                courseList.innerHTML = '';
                summary.textContent = '';
                return;
            }

            const program = programs[key];
            title.textContent = program.name + ' — Required Courses';
            courseList.innerHTML = '';

            program.courses.forEach(course => {
                const div = document.createElement('div');
                div.className = 'course';
                div.innerHTML = `
                    <input type="checkbox" data-credits="${course.credits}" onchange="updateCredits()">
                    <span>${course.code} — ${course.name}</span>
                    <span class="credits">${course.credits} credits</span>
                `;
                courseList.appendChild(div);
            });

            updateCredits();
        }

        function updateCredits() {
            const key = document.getElementById('major-select').value;
            if (!key) return;

            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            let completed = 0;
            let listed = 0;
            checkboxes.forEach(box => {
                const credits = parseInt(box.dataset.credits);
                listed += credits;
                if (box.checked) completed += credits;
            });

            const total = programs[key].totalRequired;
            const percent = Math.round((completed / total) * 100);
            document.getElementById('summary').textContent =
                `Credits completed: ${completed} / ${total} required (${percent}%) — showing ${listed} of ${total} credits`;
        }

        init();
    </script>
</body>
</html>
